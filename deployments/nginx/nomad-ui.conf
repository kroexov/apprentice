server {
    listen 80;
    server_name nomad.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name nomad.example.com;

    ssl_certificate     /etc/letsencrypt/live/nomad.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nomad.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Create password file: sudo htpasswd -c /etc/nginx/.htpasswd <username>
    auth_basic           "Nomad";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass         http://127.0.0.1:4646;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support for Nomad UI log streaming and exec.
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 600s;
    }
}
